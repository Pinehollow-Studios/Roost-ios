/* ===================================================================
 * Roost Design System — Colors, Typography & Core Tokens
 * ===================================================================
 * Source of truth: src/Design Ethos V2.md, src/Roost Pro Brand Guidelines.md,
 * and src/ios/DesignSystem.swift.
 *
 * DM Sans is self-hosted from fonts/ (uploaded brand TTFs).
 * Values use sRGB hex — mirrors the Swift Color(hex:) tokens 1:1.
 * =================================================================== */

/* ---------- DM Sans (self-hosted, static cuts) ---------- */
@font-face { font-family: "DM Sans"; font-style: normal; font-weight: 100; font-display: swap; src: url("fonts/DMSans-Thin.ttf") format("truetype"); }
@font-face { font-family: "DM Sans"; font-style: italic; font-weight: 100; font-display: swap; src: url("fonts/DMSans-ThinItalic.ttf") format("truetype"); }
@font-face { font-family: "DM Sans"; font-style: normal; font-weight: 200; font-display: swap; src: url("fonts/DMSans-ExtraLight.ttf") format("truetype"); }
@font-face { font-family: "DM Sans"; font-style: italic; font-weight: 200; font-display: swap; src: url("fonts/DMSans-ExtraLightItalic.ttf") format("truetype"); }
@font-face { font-family: "DM Sans"; font-style: normal; font-weight: 300; font-display: swap; src: url("fonts/DMSans-Light.ttf") format("truetype"); }
@font-face { font-family: "DM Sans"; font-style: italic; font-weight: 300; font-display: swap; src: url("fonts/DMSans-LightItalic.ttf") format("truetype"); }
@font-face { font-family: "DM Sans"; font-style: normal; font-weight: 400; font-display: swap; src: url("fonts/DMSans-Regular.ttf") format("truetype"); }
@font-face { font-family: "DM Sans"; font-style: italic; font-weight: 400; font-display: swap; src: url("fonts/DMSans-Italic.ttf") format("truetype"); }
@font-face { font-family: "DM Sans"; font-style: normal; font-weight: 500; font-display: swap; src: url("fonts/DMSans-Medium.ttf") format("truetype"); }
@font-face { font-family: "DM Sans"; font-style: italic; font-weight: 500; font-display: swap; src: url("fonts/DMSans-MediumItalic.ttf") format("truetype"); }
@font-face { font-family: "DM Sans"; font-style: normal; font-weight: 600; font-display: swap; src: url("fonts/DMSans-SemiBold.ttf") format("truetype"); }
@font-face { font-family: "DM Sans"; font-style: italic; font-weight: 600; font-display: swap; src: url("fonts/DMSans-SemiBoldItalic.ttf") format("truetype"); }
@font-face { font-family: "DM Sans"; font-style: normal; font-weight: 700; font-display: swap; src: url("fonts/DMSans-Bold.ttf") format("truetype"); }
@font-face { font-family: "DM Sans"; font-style: italic; font-weight: 700; font-display: swap; src: url("fonts/DMSans-BoldItalic.ttf") format("truetype"); }
@font-face { font-family: "DM Sans"; font-style: normal; font-weight: 800; font-display: swap; src: url("fonts/DMSans-ExtraBold.ttf") format("truetype"); }
@font-face { font-family: "DM Sans"; font-style: italic; font-weight: 800; font-display: swap; src: url("fonts/DMSans-ExtraBoldItalic.ttf") format("truetype"); }
@font-face { font-family: "DM Sans"; font-style: normal; font-weight: 900; font-display: swap; src: url("fonts/DMSans-Black.ttf") format("truetype"); }
@font-face { font-family: "DM Sans"; font-style: italic; font-weight: 900; font-display: swap; src: url("fonts/DMSans-BlackItalic.ttf") format("truetype"); }

:root {
  /* ---------- FONT FAMILY (single family, all platforms) ---------- */
  --font-sans: "DM Sans", system-ui, -apple-system, sans-serif;

  /* ---------- SURFACE / FOREGROUND (Light mode) ---------- */
  --background: #EBE3D5;      /* Page / screen background */
  --card: #F2EBE0;            /* Component surfaces, cards */
  --muted: #DDD4C6;           /* Secondary surfaces, dividers, skeletons */
  --input: #E3D9CA;           /* Form field backgrounds — matches ios/DesignSystem.swift inputBackground */
  --foreground: #3D3229;      /* Primary text */
  --muted-foreground: rgba(61, 50, 41, 0.45);
  --hairline: rgba(61, 50, 41, 0.15);

  /* ---------- BRAND ---------- */
  --primary: #D4795E;         /* Terracotta */
  --secondary: #9DB19F;       /* Sage — ATMOSPHERIC only (illustrations, washes, empty states, decorative tints).
                                 DO NOT use for buttons, pills, chips or dots — it dissolves into warm cream.
                                 For interactive sage surfaces, use --secondary-interactive below. */
  --secondary-interactive: #6B9673;   /* Sage — INTERACTIVE use. Buttons, chips, pills, status dots, filled tags.
                                         Stronger green, keeps sage DNA but holds its own on cream + passes 4.5:1
                                         when paired with --foreground or white text on the filled variant. */
  --destructive: #C75146;
  --warning: #E6A563;
  --success: #7FA087;
  --ring: rgba(212, 121, 94, 0.30);

  /* ---------- FEATURE ACCENTS (cannot cross features) ---------- */
  --money: #337DD6;           /* blue — Money only */
  --shopping: #E9822A;        /* orange — Shopping only */
  --chores: #2FAE63;          /* green — Chores only */
  /* Calendar + Pinboard reuse --primary */

  /* ---------- DATA VIZ / CHARTS ---------- */
  --chart-1: #D4795E;
  --chart-2: #9DB19F;
  --chart-3: #E6A563;
  --chart-4: #7A9199;
  --chart-5: #7FA087;

  /* ---------- AVATAR PALETTE (12 values, ordered) ---------- */
  --avatar-01: #D4795E;
  --avatar-02: #9DB19F;
  --avatar-03: #E6A563;
  --avatar-04: #C17A6F;
  --avatar-05: #7A9199;
  --avatar-06: #A08AB8;
  --avatar-07: #C4789A;
  --avatar-08: #8B9E7D;
  --avatar-09: #B88872;
  --avatar-10: #7A8FA1;
  --avatar-11: #C9A77C;
  --avatar-12: #8A7B6F;

  /* ---------- ROOST PRO PALETTE (dark-only, gated) ---------- */
  --pro-deep-burn: #8B3A1E;
  --pro-copper:    #C4622A;
  --pro-amber:     #E8924A;
  --pro-champagne: #F5C472;
  --pro-warm-white:#FFF8F2;
  --pro-body-text: #F0D9C0;
  --pro-muted-text:#A07855;
  --pro-bg:        #0C0A08;
  --pro-card:      #1E1A16;
  --pro-muted-surface: #2C2520;
  --pro-border:    rgba(232, 146, 74, 0.15);
  --pro-gradient: linear-gradient(135deg, #8B3A1E 0%, #C4622A 33%, #E8924A 66%, #F5C472 100%);
  --pro-gradient-h: linear-gradient(90deg, #8B3A1E 0%, #C4622A 33%, #E8924A 66%, #F5C472 100%);

  /* ---------- TYPE SCALE ---------- */
  --fs-hero-number: 34px;      /* Large stats, money amounts — Bold */
  --fs-large-greeting: 28px;   /* Hero greetings — Bold */
  --fs-page-title: 26px;       /* Page titles — Bold */
  --fs-section: 20px;          /* Section headings — Bold */
  --fs-card-title: 17px;       /* Card headers — Semibold */
  --fs-body: 15px;             /* Standard body — Regular */
  --fs-label: 13px;            /* Buttons, tags, form labels — Medium */
  --fs-caption: 12px;          /* Timestamps, secondary — Regular */
  --fs-micro: 11px;            /* Eyebrow, badges — Medium, +1px tracking, CAPS */
  --fs-tab-label: 10px;        /* Tab bar labels — Medium */

  /* ---------- SPACING (atomic, 4-based) ---------- */
  --sp-micro: 4px;
  --sp-xs: 6px;
  --sp-sm: 8px;
  --sp-md: 12px;
  --sp-lg: 16px;
  --sp-xl: 20px;
  --sp-2xl: 24px;
  --sp-3xl: 32px;

  /* ---------- LAYOUT ---------- */
  --page-inset: 16px;
  --card-padding: 16px;
  --card-padding-lg: 20px;
  --screen-bottom: 32px;
  --tab-bottom-inset: 20px;

  /* ---------- RADIUS (continuous curve — use inset border + corner-smoothing where possible) ---------- */
  --r-xs: 8px;     /* Small buttons, chips */
  --r-sm: 10px;    /* Inputs, toggles */
  --r-md: 14px;    /* Cards, list rows (default) */
  --r-lg: 18px;    /* Larger cards, sheets */
  --r-xl: 22px;    /* Hero cards */
  --r-full: 999px; /* Capsule, avatar */

  /* ---------- SHADOWS (warm, terracotta-biased — never neutral grey) ---------- */
  --shadow-card: 0 2px 6px rgba(139, 58, 30, 0.05), 0 8px 20px rgba(139, 58, 30, 0.06);
  --shadow-elevated: 0 4px 10px rgba(139, 58, 30, 0.06), 0 16px 32px rgba(139, 58, 30, 0.09);
  --shadow-sheet: 0 30px 80px rgba(61, 50, 41, 0.22), 0 10px 30px rgba(139, 58, 30, 0.10);
  --shadow-tabbar: 0 -6px 20px rgba(139, 58, 30, 0.07);
  --shadow-press: 0 1px 2px rgba(139, 58, 30, 0.08);
  --shadow-hover: 0 6px 14px rgba(139, 58, 30, 0.08), 0 20px 40px rgba(139, 58, 30, 0.10);

  /* ---------- INNER HIGHLIGHTS (for material feel on elevated surfaces) ---------- */
  --highlight-top:    inset 0 1px 0 rgba(255, 248, 240, 0.55);
  --highlight-top-strong: inset 0 1px 0 rgba(255, 248, 240, 0.75);
  --highlight-edge:   inset 0 0 0 1px rgba(255, 248, 240, 0.06);
  /* Pro surfaces use a warmer copper-biased inner highlight */
  --pro-highlight-top:   inset 0 1px 0 rgba(245, 196, 114, 0.18);
  --pro-highlight-edge:  inset 0 0 0 1px rgba(232, 146, 74, 0.10);

  /* ---------- GRAIN (material texture — overlay at 3–6% opacity) ---------- */
  --noise: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.55 0 0 0 0 0.47 0 0 0 0 0.35 0 0 0 0.9 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");

  /* ---------- MOTION (spring-based tokens; approximate CSS cubic beziers) ---------- */
  --motion-page: cubic-bezier(0.34, 1.08, 0.42, 1)   420ms;
  --motion-modal: cubic-bezier(0.32, 0.88, 0.42, 1)  320ms;
  --motion-press: cubic-bezier(0.18, 0.62, 0.3, 1)   180ms;
  --motion-release: cubic-bezier(0.26, 0.68, 0.3, 1) 260ms;
  --motion-list: cubic-bezier(0.38, 0.82, 0.4, 1)    380ms;
  --motion-checkmark: cubic-bezier(0.28, 0.52, 0.4, 1.3) 280ms;
  --motion-hover: cubic-bezier(0.25, 0.7, 0.35, 1)   220ms;
}

/* ---------- DARK MODE ---------- */
/* Dark mode is warm charcoal-brown, never neutral grey / black. */
[data-theme="dark"], .dark {
  --background: #0F0D0B;
  --card: #1A1816;
  --muted: #2A2623;
  --input: #2A2623;
  --foreground: #F2EBE0;
  --muted-foreground: rgba(242, 235, 224, 0.45);
  --hairline: rgba(242, 235, 224, 0.10);

  --secondary: #7A8C7C;
  --secondary-interactive: #8FB295;   /* Dark-mode sage for interactive use — slightly lifted for cream-on-dark contrast */
  --money: #5B9BE8;
  --shopping: #F39A3D;
  --chores: #45C978;
}

/* ============================================================
 * BASE / SEMANTIC STYLES
 * ============================================================ */

html, body {
  font-family: var(--font-sans);
  font-size: var(--fs-body);
  line-height: 1.45;
  color: var(--foreground);
  background: var(--background);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

/* Structural headings — matches DesignSystem.Typography exactly */
h1, .roost-hero { font: 700 var(--fs-hero-number)/1.1 var(--font-sans); letter-spacing: -0.01em; }
.roost-greeting { font: 700 var(--fs-large-greeting)/1.15 var(--font-sans); letter-spacing: -0.01em; }
h2, .roost-page-title { font: 700 var(--fs-page-title)/1.2 var(--font-sans); letter-spacing: -0.005em; }
h3, .roost-section    { font: 700 var(--fs-section)/1.25 var(--font-sans); }
h4, .roost-card-title { font: 600 var(--fs-card-title)/1.3 var(--font-sans); }

p, .roost-body { font: 400 var(--fs-body)/1.45 var(--font-sans); }
.roost-label   { font: 500 var(--fs-label)/1.3 var(--font-sans); }
.roost-caption { font: 400 var(--fs-caption)/1.35 var(--font-sans); color: var(--muted-foreground); }

/* Eyebrow / micro — ALL CAPS, +1px tracking */
.roost-eyebrow, .roost-micro {
  font: 500 var(--fs-micro)/1.3 var(--font-sans);
  letter-spacing: 1px;
  text-transform: uppercase;
}

/* Tab-bar label */
.roost-tab-label { font: 500 var(--fs-tab-label)/1.2 var(--font-sans); }

/* Tabular numerals for money/figures */
.roost-tabular { font-variant-numeric: tabular-nums; }

/* Signature display — hero numbers (money, stats). Use sparingly. */
.roost-hero-number {
  font: 900 76px/1 var(--font-sans);
  letter-spacing: -0.04em;
  font-variant-numeric: tabular-nums;
  font-feature-settings: "tnum", "ss01";
}
.roost-hero-number--sm {
  font: 900 48px/1 var(--font-sans);
  letter-spacing: -0.035em;
  font-variant-numeric: tabular-nums;
}

/* Material card — cream surface with warm shadow + inner highlight */
.roost-material {
  background: var(--card);
  border-radius: var(--r-md);
  box-shadow: var(--highlight-top), var(--shadow-card);
  transition: transform var(--motion-hover), box-shadow var(--motion-hover);
}
.roost-material:hover {
  transform: translateY(-2px);
  box-shadow: var(--highlight-top-strong), var(--shadow-hover);
}
.roost-material:active {
  transform: scale(0.98) translateY(0);
  box-shadow: var(--highlight-top), var(--shadow-press);
  transition-duration: 120ms;
}

/* Grain overlay utility — apply as pseudo-element on Pro surfaces */
.roost-grain {
  position: relative;
  isolation: isolate;
}
.roost-grain::after {
  content: "";
  position: absolute; inset: 0;
  background-image: var(--noise);
  background-size: 180px 180px;
  opacity: 0.06;
  mix-blend-mode: overlay;
  pointer-events: none;
  z-index: 1;
}

/* Pro surface — dark base with copper gradient as LIGHT SOURCE (edges + glow), not fill */
.roost-pro-surface {
  position: relative;
  background: var(--pro-card);
  border-radius: var(--r-lg);
  box-shadow: var(--pro-highlight-top), var(--pro-highlight-edge), 0 20px 50px rgba(0,0,0,0.5);
  overflow: hidden;
  isolation: isolate;
}
.roost-pro-surface::before {
  /* copper radial glow behind content, top-right */
  content: "";
  position: absolute;
  top: -40%; right: -20%;
  width: 70%; height: 120%;
  background: radial-gradient(ellipse at center, rgba(232,146,74,0.35), transparent 60%);
  filter: blur(40px);
  pointer-events: none;
  z-index: 0;
}
.roost-pro-surface::after {
  /* grain */
  content: "";
  position: absolute; inset: 0;
  background-image: var(--noise);
  background-size: 180px 180px;
  opacity: 0.08;
  mix-blend-mode: overlay;
  pointer-events: none;
  z-index: 1;
}
.roost-pro-surface > * { position: relative; z-index: 2; }

/* Pro CTA — the ONE place solid copper gradient is allowed as a fill */
.roost-pro-cta {
  height: 52px;
  border-radius: var(--r-full);
  border: none;
  background: var(--pro-gradient-h);
  color: #4A1D0E;
  font: 700 15px var(--font-sans);
  letter-spacing: -0.2px;
  padding: 0 24px;
  box-shadow: var(--pro-highlight-top-strong, inset 0 1px 0 rgba(255,248,240,0.3)), 0 10px 24px rgba(232,146,74,0.28);
  position: relative;
  overflow: hidden;
  cursor: pointer;
  transition: transform var(--motion-press), box-shadow var(--motion-hover);
}
.roost-pro-cta:hover { transform: translateY(-1px); box-shadow: inset 0 1px 0 rgba(255,248,240,0.35), 0 14px 30px rgba(232,146,74,0.36); }
.roost-pro-cta:active { transform: scale(0.97); }
.roost-pro-cta::after {
  /* shimmer sweep */
  content: "";
  position: absolute; inset: 0;
  background: linear-gradient(100deg, transparent 35%, rgba(255,248,240,0.45) 50%, transparent 65%);
  background-size: 220% 100%;
  animation: roost-shimmer 2.4s ease-in-out infinite;
  pointer-events: none;
}
@keyframes roost-shimmer { from { background-position: 120% 0; } to { background-position: -120% 0; } }

/* Pro text gradient utility */
.pro-gradient-text {
  background: var(--pro-gradient-h);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

/* ─── Screen 1: General loading keyframes ─── */

/* Each egg cycles: orbit start → orbit mid → orbit end → nest position → hold → back */
@keyframes eggCycle {
  0% {
    transform: translate(var(--orbit-start-x), var(--orbit-start-y)) scale(1);
  }
  18% {
    transform: translate(var(--orbit-mid-x), var(--orbit-mid-y)) scale(1);
  }
  36% {
    transform: translate(var(--orbit-end-x), var(--orbit-end-y)) scale(1);
  }
  50% {
    /* Converge into the nest */
    transform: translate(var(--nx), var(--ny)) scale(1.08);
  }
  62% {
    transform: translate(var(--nx), var(--ny)) scale(1);
  }
  72% {
    /* Hold nest */
    transform: translate(var(--nx), var(--ny)) scale(1);
  }
  100% {
    /* Scatter back to orbit start */
    transform: translate(var(--orbit-start-x), var(--orbit-start-y)) scale(1);
  }
}

@keyframes breathe {
  from { transform: scale(0.94); opacity: 0.4; }
  to   { transform: scale(1.08); opacity: 0.85; }
}

@keyframes spinCW  { from { transform: rotate(0deg); }  to { transform: rotate(360deg); } }
@keyframes spinCCW { from { transform: rotate(0deg); }  to { transform: rotate(-360deg); } }

@keyframes tileMorph {
  0%   { border-radius: 40px; transform: scale(1) rotate(0deg); }
  50%  { border-radius: 50% 40% 50% 40% / 40% 50% 40% 50%; transform: scale(1.04) rotate(2deg); }
  100% { border-radius: 40px; transform: scale(1) rotate(0deg); }
}

@keyframes tileShine {
  0%   { left: -60%; }
  60%  { left: 120%; }
  100% { left: 120%; }
}

@keyframes auraDrift {
  from { transform: translate(-2%, -1%) scale(1); }
  to   { transform: translate(2%,  1%) scale(1.06); }
}

@keyframes textPulse {
  0%, 100% { opacity: 0.45; }
  50%      { opacity: 0.85; }
}

@keyframes dotBounce {
  0%, 100% { transform: translateY(0);   opacity: 0.35; }
  50%      { transform: translateY(-3px); opacity: 0.85; }
}

@keyframes captionFade {
  0%, 30%   { opacity: 0; transform: translateY(4px); }
  40%, 60%  { opacity: 1; transform: translateY(0); }
  70%, 100% { opacity: 0; transform: translateY(-4px); }
}

/* ─── Screen 2: Auth loading keyframes ─── */

@keyframes eggFly {
  0% {
    transform: translate(var(--ox), var(--oy)) scale(0.6);
    opacity: 0;
    filter: blur(4px);
  }
  30% {
    opacity: 1;
    filter: blur(0);
  }
  55% {
    transform: translate(var(--mx), var(--my)) scale(1.1);
    opacity: 1;
    filter: blur(0);
  }
  85% {
    transform: translate(var(--nx), var(--ny)) scale(1.18);
  }
  100% {
    transform: translate(var(--nx), var(--ny)) scale(1);
  }
}

@keyframes eggBreathe {
  0%, 100% { transform: translate(var(--nx), var(--ny)) scale(1); }
  50%      { transform: translate(var(--nx), var(--ny)) scale(1.06); }
}

@keyframes tileLift {
  0%   { transform: scale(0.7); opacity: 0; }
  30%  { transform: scale(0.7); opacity: 1; }
  100% { transform: scale(1);   opacity: 1; }
}

@keyframes pulseRing {
  0%   { transform: scale(0.9); opacity: 0; }
  20%  { opacity: 0.6; }
  100% { transform: scale(2.2); opacity: 0; }
}

@keyframes sageBreeze {
  0%   { left: -40%; opacity: 0; }
  20%  { opacity: 0.7; }
  80%  { opacity: 0.7; }
  100% { left: 120%; opacity: 0; }
}

@keyframes auroraA {
  from { transform: translate(0, 0) scale(1); }
  to   { transform: translate(10%, 8%) scale(1.15); }
}
@keyframes auroraB {
  from { transform: translate(0, 0) scale(1); }
  to   { transform: translate(-8%, -10%) scale(1.1); }
}
@keyframes auroraC {
  from { transform: translate(0, 0) scale(1); }
  to   { transform: translate(-6%, 8%) scale(1.2); }
}

@keyframes letterDrop {
  0%   { opacity: 0; transform: translateY(-14px) scale(0.85); }
  60%  { opacity: 1; transform: translateY(2px) scale(1.02); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}

@keyframes fadeUp {
  0%   { opacity: 0; transform: translateY(6px); }
  100% { opacity: 1; transform: translateY(0); }
}

@keyframes statusPulse {
  0%, 100% { transform: scale(1); opacity: 0.7; }
  50%      { transform: scale(1.5); opacity: 1; }
}

@keyframes progressSlide {
  0%   { transform: translateX(-100%); }
  100% { transform: translateX(350%); }
}

// ─────────────────────────────────────────────────────────────
// Liquid glass pill — blur + tint + shine
// ─────────────────────────────────────────────────────────────
function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      {/* blur + tint */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      {/* shine */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Navigation bar — glass pills + large title
// ─────────────────────────────────────────────────────────────
function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {

function IOSList({ header, children, dark = false }) {

function IOSDevice({

// ─────────────────────────────────────────────────────────────
// Keyboard — iOS 26 liquid glass
// ─────────────────────────────────────────────────────────────
function IOSKeyboard({ dark = false }) {

  // special-key icons

  };

  const key = (content, { w, flex, ret, fs = 25, k } = {}) => (
    <div key={k} style={{
      height: 42, borderRadius: 8.5,
      flex: flex ? 1 : undefined, width: w, minWidth: 0,

  return (
    <div style={{
      position: 'relative', zIndex: 15, borderRadius: 27, overflow: 'hidden',

        ? '0 -2px 20px rgba(0,0,0,0.09)'
        : '0 -1px 6px rgba(0,0,0,0.018), 0 -3px 20px rgba(0,0,0,0.012)',

      {/* liquid glass bg — same recipe as nav pills */}

        position: 'absolute', inset: 0, borderRadius: 27,

          {key(icons.ret, { w: 92.25, ret: true, k: 'ret' })}
        </div>
      </div>

      {/* bottom spacer (emoji+mic area, icons omitted) */}
      <div style={{ height: 56, width: '100%', position: 'relative' }} />
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// SCREEN 1 — GENERAL LOADING · "Window light"
// ─────────────────────────────────────────────────────────────
function GeneralLoading({ statusText = 'Settling in' }) {
  const [dotCount, setDotCount] = useState(1);
  useEffect(() => {
    const id = setInterval(() => setDotCount(c => (c % 3) + 1), 500);
    return () => clearInterval(id);
  }, []);

  return (
    <div style={{
      position: 'relative', width: '100%', height: '100%',
      background: `radial-gradient(ellipse at 50% 38%, #F4ECDD 0%, ${BG} 62%, #E0D6C4 100%)`,
      overflow: 'hidden',
      display: 'flex', flexDirection: 'column',
      alignItems: 'center', justifyContent: 'center',
      fontFamily: '"DM Sans", system-ui, sans-serif',
    }}>
      {/* Subtle grain */}
      <div style={{
        position: 'absolute', inset: 0,
        backgroundImage: `url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.55 0 0 0 0 0.47 0 0 0 0 0.35 0 0 0 0.9 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>")`,
        opacity: 0.05, mixBlendMode: 'overlay', pointerEvents: 'none',
      }} />

      {/* Window-light shaft — slow diagonal rake across the scene */}
      <div style={{
        position: 'absolute', inset: 0, overflow: 'hidden',
        pointerEvents: 'none',
      }}>
        <div style={{
          position: 'absolute',
          width: '180%', height: 160,
          top: '50%', left: '-40%',
          background: 'linear-gradient(90deg, transparent 0%, rgba(255,237,210,0.0) 10%, rgba(255,237,210,0.65) 42%, rgba(255,245,225,0.85) 50%, rgba(255,237,210,0.65) 58%, rgba(255,237,210,0) 90%, transparent 100%)',
          filter: 'blur(18px)',
          transformOrigin: 'center',
          animation: 'windowLight 8s ease-in-out infinite',
        }} />
      </div>

      {/* Sage wisp — a single soft curl drifting past */}
      <svg style={{
        position: 'absolute', top: '30%', left: '-30%',
        width: '160%', height: 240,
        opacity: 0.32, pointerEvents: 'none',
        animation: 'sageWisp 12s ease-in-out infinite',
      }} viewBox="0 0 800 240" fill="none">
        <path d="M 0 120 Q 150 40, 300 120 T 600 120 T 900 120"
          stroke={SAGE_INT} strokeWidth="1.4" fill="none" strokeLinecap="round" />
        <path d="M 0 130 Q 180 80, 340 140 T 650 120 T 900 140"
          stroke={SAGE_INT} strokeWidth="1" fill="none" strokeLinecap="round" opacity="0.5" />
      </svg>

      {/* Soft halo behind the icon */}
      <div style={{
        position: 'absolute', width: 280, height: 280, borderRadius: '50%',
        background: 'radial-gradient(circle, rgba(212,121,94,0.14) 0%, rgba(212,121,94,0) 65%)',
        animation: 'halo 4.4s ease-in-out infinite',
        top: '50%', left: '50%',
        transform: 'translate(-50%, calc(-50% - 32px))',
        filter: 'blur(8px)',
      }} />

      {/* The actual AppIcon — breathing, never redrawn */}
      <div style={{
        width: 108, height: 108,
        marginBottom: 40,
        borderRadius: 24,
        overflow: 'hidden',
        boxShadow: '0 2px 6px rgba(139,58,30,0.08), 0 18px 40px rgba(139,58,30,0.16), inset 0 1px 0 rgba(255,248,240,0.4)',
        animation: 'iconBreathe 4.4s ease-in-out infinite',
        position: 'relative',
      }}>
        <img src={ICON_SRC} alt="Roost" style={{
          width: '100%', height: '100%', display: 'block',
        }} />
      </div>

      {/* Status line */}
      <div style={{
        fontSize: 14, color: MUTED,
        letterSpacing: 0.2,
        display: 'flex', alignItems: 'baseline', gap: 2,
        animation: 'statusFade 4.4s ease-in-out infinite',
      }}>
        <span>{statusText}</span>
        <span style={{ display: 'inline-block', width: 18, textAlign: 'left' }}>
          {'.'.repeat(dotCount)}
        </span>
      </div>

      <style>{`
        @keyframes windowLight {
          0%   { transform: translateY(-120%) rotate(-18deg); opacity: 0; }
          20%  { opacity: 1; }
          80%  { opacity: 1; }
          100% { transform: translateY(120%) rotate(-18deg); opacity: 0; }
        }
        @keyframes sageWisp {
          0%   { transform: translateX(-10%); opacity: 0; }
          15%  { opacity: 0.32; }
          85%  { opacity: 0.32; }
          100% { transform: translateX(30%); opacity: 0; }
        }
        @keyframes halo {
          0%, 100% { opacity: 0.7; transform: translate(-50%, calc(-50% - 32px)) scale(0.96); }
          50%      { opacity: 1;   transform: translate(-50%, calc(-50% - 32px)) scale(1.04); }
        }
        @keyframes iconBreathe {
          0%, 100% { transform: scale(1); }
          50%      { transform: scale(1.025); }
        }
        @keyframes statusFade {
          0%, 100% { opacity: 0.62; }
          50%      { opacity: 1; }
        }
      `}</style>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// SCREEN 2 — AUTH LOADING · "Coming home"
// ─────────────────────────────────────────────────────────────
function AuthLoading() {
  const ROOST = ['R', 'o', 'o', 's', 't'];
  const [statusIdx, setStatusIdx] = useState(0);
  const STATUSES = ['Unlocking your home', 'Gathering the nest', 'Almost there'];
  useEffect(() => {
    const id = setInterval(() => setStatusIdx(i => (i + 1) % STATUSES.length), 1800);
    return () => clearInterval(id);
  }, []);

  return (
    <div style={{
      position: 'relative', width: '100%', height: '100%',
      overflow: 'hidden',
      background: `linear-gradient(175deg, #F6E8D3 0%, #EBD4B8 40%, #DCA88A 75%, ${T} 100%)`,
      display: 'flex', flexDirection: 'column',
      alignItems: 'center', justifyContent: 'center',
      fontFamily: '"DM Sans", system-ui, sans-serif',
      color: FG,
    }}>
      {/* Soft sun glow at the horizon */}
      <div style={{
        position: 'absolute',
        bottom: '28%', left: '50%',
        width: 420, height: 420, borderRadius: '50%',
        transform: 'translate(-50%, 50%)',
        background: 'radial-gradient(circle, rgba(255,215,170,0.85) 0%, rgba(255,180,130,0.35) 30%, rgba(212,121,94,0) 65%)',
        filter: 'blur(6px)',
        animation: 'sunGlow 4s ease-out 0.2s both',
      }} />

      {/* Horizon arc — draws itself across the screen */}
      <svg style={{
        position: 'absolute', inset: 0, width: '100%', height: '100%',
        pointerEvents: 'none',
      }} viewBox="0 0 340 720" preserveAspectRatio="none">
        <path
          d="M -20 440 Q 170 380 360 440"
          stroke={T_DEEP} strokeWidth="1.5" fill="none" strokeLinecap="round"
          strokeDasharray="600" strokeDashoffset="600"
          style={{ animation: 'horizonDraw 1.8s cubic-bezier(0.4, 0, 0.2, 1) 0.2s forwards' }}
        />
        <path
          d="M -20 452 Q 180 404 360 452"
          stroke={T_DEEP} strokeWidth="0.8" fill="none" strokeLinecap="round" opacity="0.5"
          strokeDasharray="600" strokeDashoffset="600"
          style={{ animation: 'horizonDraw 2s cubic-bezier(0.4, 0, 0.2, 1) 0.4s forwards' }}
        />
      </svg>

      {/* Grain */}
      <div style={{
        position: 'absolute', inset: 0,
        backgroundImage: `url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.55 0 0 0 0 0.47 0 0 0 0 0.35 0 0 0 0.9 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>")`,
        opacity: 0.06, mixBlendMode: 'overlay', pointerEvents: 'none',
      }} />

      {/* Sage breeze — a single thin pass */}
      <div style={{
        position: 'absolute', inset: 0, overflow: 'hidden', pointerEvents: 'none',
      }}>
        <div style={{
          position: 'absolute',
          top: '38%', left: '-40%',
          width: '180%', height: 2,
          background: `linear-gradient(90deg, transparent, ${SAGE_INT}, transparent)`,
          opacity: 0.6,
          transform: 'rotate(-6deg)',
          animation: 'breeze 3.2s ease-in-out 1.8s both',
        }} />
      </div>

      {/* Content stack — pushed up slightly above horizon */}
      <div style={{
        position: 'relative', zIndex: 2,
        display: 'flex', flexDirection: 'column', alignItems: 'center',
        marginBottom: 120,
      }}>
        {/* The icon — fades up as horizon completes */}
        <div style={{
          width: 96, height: 96,
          borderRadius: 22,
          overflow: 'hidden',
          marginBottom: 22,
          boxShadow: '0 4px 12px rgba(139,58,30,0.18), 0 24px 48px rgba(139,58,30,0.24), inset 0 1px 0 rgba(255,248,240,0.5)',
          position: 'relative',
          animation: 'iconRise 1.4s cubic-bezier(0.2, 0.8, 0.3, 1) 1.3s both',
        }}>
          <img src={ICON_SRC} alt="Roost" style={{
            width: '100%', height: '100%', display: 'block',
          }} />
          {/* One-time shimmer sweep across the icon */}
          <div style={{
            position: 'absolute', inset: 0,
            background: 'linear-gradient(100deg, transparent 40%, rgba(255,248,240,0.7) 50%, transparent 60%)',
            backgroundSize: '220% 100%',
            backgroundPosition: '120% 0',
            animation: 'iconShimmer 1.4s ease-out 2.4s both',
            mixBlendMode: 'overlay',
          }} />
        </div>

        {/* Wordmark — drops in letter by letter */}
        <div style={{
          display: 'flex', gap: 0,
          fontSize: 32, fontWeight: 700, letterSpacing: -0.6,
          color: FG,
          marginBottom: 10,
        }}>
          {ROOST.map((ch, i) => (
            <span key={i} style={{
              display: 'inline-block',
              animation: `letterDrop 0.55s cubic-bezier(0.34, 1.18, 0.42, 1) ${2.5 + i * 0.07}s both`,
            }}>{ch}</span>
          ))}
        </div>

        {/* Tagline */}
        <div style={{
          fontSize: 13, color: 'rgba(61,50,41,0.62)', letterSpacing: 0.3,
          animation: 'taglineIn 0.8s ease-out 3s both',
        }}>
          your home, together
        </div>
      </div>

      {/* Status line + progress — below horizon */}
      <div style={{
        position: 'absolute', bottom: 72, left: 0, right: 0,
        display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 14,
        animation: 'statusIn 0.6s ease-out 3.3s both',
      }}>
        <div style={{
          fontSize: 12, color: 'rgba(61,50,41,0.55)',
          letterSpacing: 0.6, textTransform: 'uppercase', fontWeight: 500,
          minHeight: 16, position: 'relative',
        }}>
          {STATUSES.map((s, i) => (
            <span key={s} style={{
              position: i === 0 ? 'relative' : 'absolute',
              top: i === 0 ? 0 : 0, left: 0, right: 0,
              opacity: i === statusIdx ? 1 : 0,
              transition: 'opacity 450ms ease-out',
              whiteSpace: 'nowrap', textAlign: 'center',
            }}>{s}</span>
          ))}
        </div>

        <div style={{
          width: 120, height: 2,
          borderRadius: 1,
          background: 'rgba(184,86,60,0.22)',
          overflow: 'hidden',
          position: 'relative',
        }}>
          <div style={{
            position: 'absolute', top: 0, left: '-40%',
            width: '40%', height: '100%',
            background: T_DEEP,
            borderRadius: 1,
            animation: 'progressSlide 1.8s cubic-bezier(0.4, 0, 0.2, 1) infinite',
          }} />
        </div>
      </div>

      <style>{`
        @keyframes sunGlow {
          0%   { opacity: 0; transform: translate(-50%, 70%) scale(0.6); }
          100% { opacity: 1; transform: translate(-50%, 50%) scale(1); }
        }
        @keyframes horizonDraw {
          to { stroke-dashoffset: 0; }
        }
        @keyframes iconRise {
          0%   { opacity: 0; transform: translateY(24px) scale(0.82); filter: blur(6px); }
          60%  { opacity: 1; filter: blur(0); }
          100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }
        @keyframes iconShimmer {
          0%   { background-position: 120% 0; opacity: 0; }
          20%  { opacity: 1; }
          80%  { opacity: 1; }
          100% { background-position: -120% 0; opacity: 0; }
        }
        @keyframes letterDrop {
          0%   { opacity: 0; transform: translateY(-18px); }
          100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes taglineIn {
          0%   { opacity: 0; transform: translateY(6px); }
          100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes breeze {
          0%   { transform: translateX(-10%) rotate(-6deg); opacity: 0; }
          30%  { opacity: 0.6; }
          100% { transform: translateX(40%) rotate(-6deg); opacity: 0; }
        }
        @keyframes statusIn {
          0%   { opacity: 0; transform: translateY(8px); }
          100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes progressSlide {
          0%   { left: -40%; }
          100% { left: 100%; }
        }
      `}</style>
    </div>
  );
}

// Expose to global scope
Object.assign(window, { GeneralLoading, AuthLoading });

// Main app entry — renders both loading frames
const TWEAKS = /*EDITMODE-BEGIN*/{
  "speed": "1.4",
  "status": "loading"
}/*EDITMODE-END*/;

const STATUS_COPY = {
  settling: 'Settling in',
  loading: 'Loading',
  home: 'Warming up',
};

function App() {
  const [tweaks, setTweaks] = React.useState(TWEAKS);
  const [replayKey, setReplayKey] = React.useState(0);

  React.useEffect(() => {
    const handler = (e) => {
      if (!e.data) return;
      if (e.data.type === '__activate_edit_mode') {
        document.getElementById('tweaks-panel').classList.add('visible');
      } else if (e.data.type === '__deactivate_edit_mode') {
        document.getElementById('tweaks-panel').classList.remove('visible');
      }
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');

    document.querySelectorAll('.tweaks .seg').forEach(seg => {
      const group = seg.dataset.group;
      seg.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', () => {
          seg.querySelectorAll('button').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          const value = btn.dataset.value;
          setTweaks(t => {
            const next = { ...t, [group]: value };
            window.parent.postMessage({
              type: '__edit_mode_set_keys',
              edits: { [group]: value },
            }, '*');
            return next;
          });
        });
      });
    });
    document.getElementById('replay-btn').addEventListener('click', () => {
      setReplayKey(k => k + 1);
    });

    return () => window.removeEventListener('message', handler);
  }, []);

  const applySpeed = React.useCallback((el) => {
    if (!el) return;
    const speed = parseFloat(tweaks.speed) || 1;
    const factor = 1 / speed;
    requestAnimationFrame(() => {
      const walker = document.createTreeWalker(el, NodeFilter.SHOW_ELEMENT);
      let n = walker.currentNode;
      while (n) {
        const cs = getComputedStyle(n);
        if (cs.animationName && cs.animationName !== 'none') {
          if (!n.dataset.origDur) n.dataset.origDur = cs.animationDuration;
          const scaled = n.dataset.origDur.split(',').map(s => {
            const val = parseFloat(s);
            const unit = s.trim().endsWith('ms') ? 'ms' : 's';
            return (val * factor).toFixed(3) + unit;
          }).join(', ');
          n.style.animationDuration = scaled;
        }
        n = walker.nextNode();
      }
    });
  }, [tweaks.speed]);

  const status = STATUS_COPY[tweaks.status] || 'Settling in';

  return (
    <div className="frames">
      <div className="frame-col">
        <div className="label">
          <span className="tag">01 · general</span>
          <span className="name">Window light</span>
          <span className="desc">The icon sits calmly while a shaft of morning light rakes across. A sage wisp drifts past.</span>
        </div>
        <div data-screen-label="01 General Loading" ref={applySpeed} key={'g' + tweaks.speed + tweaks.status}>
          <IOSDevice width={340} height={720}>
            <GeneralLoading statusText={status} />
          </IOSDevice>
        </div>
      </div>

      <div className="frame-col">
        <div className="label">
          <span className="tag">02 · auth / log in</span>
          <span className="name">Coming home</span>
          <span className="desc">A terracotta horizon inks itself across the screen; the icon rises with the sun, then "Roost" drops in.</span>
        </div>
        <div data-screen-label="02 Auth Loading" ref={applySpeed} key={'a' + tweaks.speed + replayKey}>
          <IOSDevice width={340} height={720}>
            <AuthLoading />
          </IOSDevice>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>

</body>
</html>
