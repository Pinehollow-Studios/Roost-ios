name: Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    name: Build iOS app
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Resolve packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Roost_iOS.xcodeproj \
            -scheme Roost_iOS

      - name: Build
        run: |
          xcodebuild build \
            -project Roost_iOS.xcodeproj \
            -scheme Roost_iOS \
            -destination "generic/platform=iOS Simulator" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || xcodebuild build \
              -project Roost_iOS.xcodeproj \
              -scheme Roost_iOS \
              -destination "generic/platform=iOS Simulator" \
              -configuration Debug \
              CODE_SIGNING_ALLOWED=NO
